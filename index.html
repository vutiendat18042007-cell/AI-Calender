<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch của tôi — nói là xong</title>
<style>
  :root {
    --bg: #FCF4EE;
    --card: #FFFFFF;
    --card2: #FFF7F2;
    --accent: #D85A30;
    --accent-dark: #993C1D;
    --accent2: #3B7A57;
    --text: #4A1B0C;
    --muted: #9A6A55;
    --danger: #C0392B;
    --line: #F3DACE;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1000px 520px at 50% -12%, #FBE1D3 0%, var(--bg) 55%);
    color: var(--text); min-height: 100vh; padding: 28px 16px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  .head { text-align: center; margin-bottom: 16px; }
  h1 { font-size: 25px; margin: 0 0 6px; display: inline-flex; align-items: center; gap: 9px; }
  h1 .heart { color: var(--accent); }
  .sub { color: var(--muted); font-size: 14px; margin: 0; }
  .langbar { display:flex; justify-content:center; align-items:center; gap:8px; margin-bottom:18px; }
  .langbar label { margin:0; }
  select {
    background: var(--card2); border: 1px solid var(--line); color: var(--text);
    border-radius: 12px; padding: 8px 12px; font-size: 14px; font-family: inherit; cursor: pointer;
  }
  select:focus { outline: none; border-color: var(--accent); }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 18px; margin-bottom: 16px;
    box-shadow: 0 4px 18px rgba(216, 90, 48, 0.07);
  }
  label { display:block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input[type=password], textarea {
    width: 100%; background: var(--card2); border: 1px solid var(--line);
    color: var(--text); border-radius: 12px; padding: 12px; font-size: 15px;
    font-family: inherit; transition: border-color .15s ease;
  }
  input[type=password]:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { min-height: 76px; resize: vertical; }
  input[type=checkbox] { accent-color: var(--accent); }
  .row { display:flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  button {
    background: var(--accent); color: #fff; border: none; border-radius: 12px;
    padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: transform .05s ease, filter .15s ease;
  }
  button:hover { filter: brightness(1.06); }
  button:active { transform: translateY(1px); }
  button.ghost { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 6px 0 4px; }
  .mic {
    width: 92px; height: 92px; border-radius: 50%; font-size: 34px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 10px #F7D3C3;
  }
  .mic.rec { background: var(--danger); box-shadow: 0 0 0 0 rgba(192,57,43,.5); animation: pulse 1.2s infinite; }
  .mic-label { font-size: 13px; color: var(--muted); }
  @keyframes pulse {
    0%{box-shadow:0 0 0 0 rgba(192,57,43,.45)}
    70%{box-shadow:0 0 0 18px rgba(192,57,43,0)}
    100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}
  }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.55; }
  .status { font-size: 13px; color: var(--accent2); min-height: 18px; margin-top: 10px; text-align: center; }
  .status.err { color: var(--danger); }
  .ev {
    background: var(--card2); border: 1px solid var(--line); border-left: 4px solid var(--accent);
    border-radius: 12px; padding: 14px; margin-bottom: 10px;
  }
  .ev .title { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
  .ev .meta { font-size: 13px; color: var(--muted); line-height: 1.7; }
  .ev .tag { display:inline-block; background:#FDE3D7; color:var(--accent-dark); font-size:11px;
    padding:2px 9px; border-radius:20px; margin-left:6px; }
  .ev.warn { border-left-color: var(--danger); }
  .ev.rec { border-left-width: 3px; }
  .ev-row { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
  .rec-badge { display:inline-flex; align-items:center; gap:4px; background:var(--accent); color:#fff;
    font-size:11px; padding:2px 9px; border-radius:20px; margin-bottom:6px; }
  .rec-badge svg { width:12px; height:12px; }
  .delbtn { background:transparent; border:1.5px solid #E7B9A5; color:var(--accent);
    border-radius:9px; padding:4px 9px; font-size:12px; font-weight:500; cursor:pointer;
    display:inline-flex; align-items:center; gap:4px; flex-shrink:0; }
  .delbtn svg { width:12px; height:12px; }
  .just-added { color:var(--accent2); font-size:12px; }
  .examples { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .chip {
    background: #FFF1E9; border:1px solid var(--line); color: var(--accent-dark);
    font-size:13px; padding:8px 12px; border-radius:20px; cursor:pointer;
    transition: border-color .15s ease;
  }
  .chip:hover { border-color: var(--accent); }
  details { margin-top: 6px; }
  summary { cursor:pointer; color: var(--muted); font-size: 13px; }
  code { background:#FDE3D7; color: var(--accent-dark); padding:1px 5px; border-radius:5px; font-size:12px; }
  .mic svg { width:46px; height:46px; display:block; }
  h1 .heart { display:inline-flex; align-items:center; vertical-align:-6px; }
  h1 .heart svg { width:30px; height:30px; }
  .lbl-ico { display:inline-flex; align-items:center; vertical-align:-5px; margin-right:5px; }
  .lbl-ico svg { width:20px; height:20px; }
  .btn-ico { display:inline-flex; align-items:center; vertical-align:-4px; margin-right:6px; }
  .btn-ico svg { width:18px; height:18px; }
</style>
</head>

  <div class="langbar">

  </div>

  <div class="card">
    <div class="mic-wrap">
      <button id="micBtn" class="mic" title="Bấm để nói"><svg viewBox="0 0 40 40" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="13" y="4" width="14" height="16" rx="7" fill="#fff"/><path d="M8 18 a12 12 0 0 0 24 0" stroke="#fff" stroke-width="2.5"/><line x1="20" y1="28" x2="20" y2="33" stroke="#fff" stroke-width="2.5"/><line x1="15" y1="33" x2="27" y2="33" stroke="#fff" stroke-width="2.5"/></svg></button>
      <span class="mic-label" id="micLabel">Bấm để nói</span>
    </div>
    <div class="status" id="status"></div>

    <label style="margin-top:14px" id="uiTextLabel" for="text">Câu bạn nói (sửa tay được)</label>
    <textarea id="text" placeholder="Ví dụ: Mai 8 giờ tối họp nhóm, nhắc tôi trước 30 phút"></textarea>

    <label style="display:flex; align-items:center; gap:8px; margin-top:10px; cursor:pointer;">
      <input id="grounding" type="checkbox" style="width:auto;"> <span class="lbl-ico"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><circle cx="12" cy="12" r="11" fill="#FFE6DA"/><circle cx="11" cy="11" r="6" fill="#fff" stroke="#993C1D" stroke-width="2"/><line x1="15.5" y1="15.5" x2="19" y2="19" stroke="#993C1D" stroke-width="2.5"/></svg></span><span id="uiGrounding">Tự tra giờ trên mạng (cho sự kiện có thật như F1, trận đấu... khi mình không nói giờ)</span>
    </label>

    <div class="row" style="margin-top:12px; justify-content:center;">
      <button id="parseBtn">Tạo lịch</button>
    </div>

    <div class="examples" id="examples"></div>
  </div>

  <div id="result"></div>

  <details>
    <summary id="uiHowSummary">Trang này hoạt động thế nào?</summary>
    <p class="hint" id="uiHowBody"></p>
  </details>
</div>

// Ngôn ngữ hiện tại (nhớ trên máy).

// ====================== TIỆN ÍCH NGÀY ======================
function mon0(date) { return (date.getDay() + 6) % 7; }
function parseDate(str) { return new Date(str + "T00:00:00"); }
function addWeeks(date, n) { const d = new Date(date); d.setDate(d.getDate() + n*7); return d; }
function nextWeekday(d, targetMon0) {
  const ahead = (targetMon0 - mon0(d) + 7) % 7;
  const r = new Date(d); r.setDate(r.getDate() + ahead); return r;
}
function fmtDate(d) {
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  return dd + "/" + mm + "/" + d.getFullYear();
}
function todayStr() {
  const t = new Date();
  return t.getFullYear() + "-" + String(t.getMonth()+1).padStart(2,"0") + "-" + String(t.getDate()).padStart(2,"0");
}

// ====================== PROMPT (theo ngôn ngữ đang chọn) ======================
function buildPrompt() {
  const L = LANGS[curLang];

    "Today is: " + ngay + " (" + thu + ").\n" +
    "Relative-date rules: " + L.relRules + "\n" +
    "If it is a repeating timetable, use 'recurrence'. " +
    "recurrence.weekday MUST be an English 3-letter code: Mon/Tue/Wed/Thu/Fri/Sat/Sun.\n" +
    "If the user mentions a place/venue/address, put it in 'location' as spoken; otherwise set 'location' = \"\".\n" +
    '{ "events": [ { "title": "", "start_time": "HH:MM", "duration_minutes": 60, ' +
    '"category": "", "location": "", "reminder_minutes_before": 30, ' +
    '"recurrence": {"weekday": "Mon", "count": 4, "start_date": "YYYY-MM-DD"}, ' +
    '"date": "YYYY-MM-DD" } ] }\n' +
    "One-off event: use 'date', set 'recurrence' = null. " +
    "Repeating event: use 'recurrence', set 'date' = null."
  );
}

// ====================== GỌI GEMINI ======================
async function callGemini(text, apiKey) {
  const url = "https://generativelanguage.googleapis.com/v1beta/models/" +
              GEMINI_MODEL + ":generateContent?key=" + encodeURIComponent(apiKey);
  const body = {
    systemInstruction: { parts: [{ text: buildPrompt() }] },
    contents: [{ parts: [{ text: text }] }],
    generationConfig: { responseMimeType: "application/json" }
  };
  const resp = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!resp.ok) {
    const msg = await resp.text();
    throw new Error("Gemini " + resp.status + ": " + msg.slice(0, 200));
  }
  const data = await resp.json();
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!raw) throw new Error("Gemini: empty response.");
  return JSON.parse(raw);
}

// ----- Đổi múi giờ bằng CODE (biết cả giờ mùa hè DST) — không để AI tự tính -----
function tzOffsetMs(timeZone, utcMs) {
  const dtf = new Intl.DateTimeFormat("en-US", { timeZone, hour12: false,
    year:"numeric", month:"2-digit", day:"2-digit",
    hour:"2-digit", minute:"2-digit", second:"2-digit" });
  const p = {}; dtf.formatToParts(new Date(utcMs)).forEach(x => p[x.type] = x.value);
  const hh = p.hour === "24" ? "00" : p.hour;
  const asUTC = Date.UTC(+p.year, +p.month-1, +p.day, +hh, +p.minute, +p.second);
  return asUTC - utcMs;
}
function zonedWallToUTC(y, mo, d, h, mi, timeZone) {
  const guess = Date.UTC(y, mo-1, d, h, mi);
  let off = tzOffsetMs(timeZone, guess);
  let utc = guess - off;
  const off2 = tzOffsetMs(timeZone, utc);
  if (off2 !== off) utc = guess - off2;
  return utc;
}
function fmtInZone(utcMs, timeZone) {
  const dtf = new Intl.DateTimeFormat("en-CA", { timeZone, hour12: false,
    year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" });
  const p = {}; dtf.formatToParts(new Date(utcMs)).forEach(x => p[x.type] = x.value);
  const hh = p.hour === "24" ? "00" : p.hour;
  return { date: p.year+"-"+p.month+"-"+p.day, time: hh+":"+p.minute };
}
function applyTimezone(parsed) {
  for (const ev of (parsed.events || [])) {
    if (ev.local_time && ev.timezone) {
      const dateStr = ev.date || todayStr();
      const [y, mo, d] = dateStr.split("-").map(Number);
      const [h, mi] = String(ev.local_time).split(":").map(Number);
      try {
        const utc = zonedWallToUTC(y, mo, d, h||0, mi||0, ev.timezone);
        const local = fmtInZone(utc, LOCAL_TZ);
        ev._local = ev.local_time + " (" + ev.timezone + ")";
        ev.date = local.date;
        ev.start_time = local.time;
      } catch (e) {
        ev.start_time = ev.local_time;
        ev._local = ev.local_time + " (" + ev.timezone + " — ?)";
      }
    }
  }
  return parsed;
}
function extractJSON(txt) {
  if (!txt) throw new Error("Gemini: empty response.");
  txt = txt.replace(/```(?:json)?/g, "").trim();
  const i = txt.indexOf("{"), j = txt.lastIndexOf("}");
  if (i === -1 || j === -1) throw new Error("Couldn't read JSON from AI. Try again.");
  return JSON.parse(txt.slice(i, j + 1));
}
async function callGeminiGrounded(text, apiKey) {

              GEMINI_MODEL + ":generateContent?key=" + encodeURIComponent(apiKey);

// ====================== TRẢI LỊCH ======================
function expandEvents(parsed) {
  const occ = [];
  for (const ev of (parsed.events || [])) {
    const rec = ev.recurrence;
    if (rec) {
      const wdIdx = WEEKDAY_MAP[String(rec.weekday).toLowerCase().slice(0,3)];
      const first = nextWeekday(parseDate(rec.start_date), wdIdx);
      const count = rec.count || 1;
      for (let i = 0; i < count; i++) occ.push({ day: addWeeks(first, i), ev });
    } else if (ev.date) {
      occ.push({ day: parseDate(ev.date), ev });
    } else {
      occ.push({ day: null, ev });
    }
  }
  occ.sort((a,b) => (a.day===null) - (b.day===null) || (a.day && b.day ? a.day - b.day : 0));
  return occ;
}

// ====================== XUẤT FILE .ics (iCalendar) ======================
let lastOcc = [];
function pad2(n) { return String(n).padStart(2, "0"); }
function icsStamp(d) {
  return d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate()) +
         "T" + pad2(d.getHours()) + pad2(d.getMinutes()) + "00";
}
function icsStampUTC(d) {
  return d.getUTCFullYear() + pad2(d.getUTCMonth()+1) + pad2(d.getUTCDate()) +
         "T" + pad2(d.getUTCHours()) + pad2(d.getUTCMinutes()) + pad2(d.getUTCSeconds()) + "Z";
}
function icsEsc(s) {
  return String(s || "").replace(/\\/g,"\\\\").replace(/;/g,"\\;")
                        .replace(/,/g,"\\,").replace(/\n/g,"\\n");
}
function buildICS(occ) {

    const s = new Date(day); s.setHours(h||0, m||0, 0, 0);
    const e = new Date(s.getTime() + (ev.duration_minutes || 60) * 60000);
    L.push("BEGIN:VEVENT");
    L.push("UID:" + Date.now() + "-" + (i++) + "@lichcuatoi");
    L.push("DTSTAMP:" + stamp);
    L.push("DTSTART:" + icsStamp(s));
    L.push("DTEND:" + icsStamp(e));
    L.push("SUMMARY:" + icsEsc(ev.title || "Su kien"));
    if (ev.location) L.push("LOCATION:" + icsEsc(ev.location));
    if (ev.category) L.push("CATEGORIES:" + icsEsc(ev.category));
    const rm = ev.reminder_minutes_before;
    if (rm) {
      L.push("BEGIN:VALARM","TRIGGER:-PT" + rm + "M","ACTION:DISPLAY",
             "DESCRIPTION:" + icsEsc(ev.title || "Nhac"),"END:VALARM");
    }
    L.push("END:VEVENT");
  }
  L.push("END:VCALENDAR");
  return L.join("\r\n");
}
function downloadICS() {
  const real = lastOcc.filter(o => o.day);
  if (!real.length) { setStatus(t("icsNoSchedule"), true); return; }
  const blob = new Blob([buildICS(lastOcc)], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "lich-cua-toi.ics";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setStatus(t("icsDownloaded"));
}

// ====================== GHI THẲNG VÀO GOOGLE CALENDAR ======================
let tokenClient = null, accessToken = null;
function fmtLocalRFC(d) {
  return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate()) +
         "T" + pad2(d.getHours()) + ":" + pad2(d.getMinutes()) + ":00";
}
function initGoogle() {
  if (!(window.google && google.accounts && google.accounts.oauth2)) {
    setStatus(t("googleNotLoaded"), true);
    return false;
  }
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: "https://www.googleapis.com/auth/calendar.events",
      callback: (resp) => {
        if (resp.error) { setStatus(t("noAuthPrefix") + resp.error, true); return; }
        accessToken = resp.access_token;
        doInsertAll();
      }
    });
  }
  return true;
}
function addToGoogleCalendar() {
  const real = lastOcc.filter(o => o.day);
  if (!real.length) { setStatus(t("noScheduleToAdd"), true); return; }
  if (!initGoogle()) return;
  setStatus(t("requestingPermission"));
  tokenClient.requestAccessToken();
}
async function insertEvent(day, ev) {
  const [h, m] = String(ev.start_time || "09:00").split(":").map(Number);
  const s = new Date(day); s.setHours(h||0, m||0, 0, 0);
  const e = new Date(s.getTime() + (ev.duration_minutes || 60) * 60000);
  const body = {
    summary: ev.title || "Event",
    start: { dateTime: fmtLocalRFC(s), timeZone: LOCAL_TZ },
    end:   { dateTime: fmtLocalRFC(e), timeZone: LOCAL_TZ }
  };
  if (ev.location) body.location = ev.location;
  const rm = ev.reminder_minutes_before;
  if (rm) body.reminders = { useDefault: false, overrides: [{ method: "popup", minutes: rm }] };
  const resp = await fetch(
    "https://www.googleapis.com/calendar/v3/calendars/primary/events",
    { method: "POST",
      headers: { "Authorization": "Bearer " + accessToken, "Content-Type": "application/json" },
      body: JSON.stringify(body) });
  if (!resp.ok) throw new Error("Error " + resp.status + ": " + (await resp.text()).slice(0, 150));
}
async function doInsertAll() {
  const real = lastOcc.filter(o => o.day);
  setStatus(fmt(t("addingEvents"), { n: real.length }));
  let ok = 0, err = 0;
  for (const { day, ev } of real) {
    try { await insertEvent(day, ev); ok++; }
    catch (e) { err++; console.error(e); }
  }
  if (err === 0) setStatus(fmt(t("addedSuccess"), { n: ok }));
  else setStatus(fmt(t("addedPartial"), { ok, err }), err > ok);
}

// ====================== HIỂN THỊ ======================
// ====================== BỘ NHỚ TẠM CỦA LỊCH (buffer) ======================
let buffer = [];          // danh sách sự kiện đang chờ tạo (mỗi phần tử = 1 ev)
let lastAddedCount = 0;   // số sự kiện vừa thêm ở lần bấm gần nhất

const UIX = {
  vi: { buf:"Bộ nhớ tạm", willMake:"sẽ tạo", events:"sự kiện", justAdded:"+ vừa thêm {n}", del:"Xoá", clearAll:"Xoá tất cả", repeat:"Lặp lại {n} lần", weekly:"{wd} hằng tuần", range:"từ {a} đến {b}", empty:"Chưa có lịch nào trong bộ nhớ tạm." },
  en: { buf:"Draft list", willMake:"will create", events:"event(s)", justAdded:"+ added {n}", del:"Delete", clearAll:"Clear all", repeat:"Repeats {n}×", weekly:"{wd} weekly", range:"from {a} to {b}", empty:"No events in the draft list yet." },
  fr: { buf:"Liste temporaire", willMake:"va créer", events:"événement(s)", justAdded:"+ ajouté {n}", del:"Supprimer", clearAll:"Tout effacer", repeat:"Répété {n}×", weekly:"{wd} chaque semaine", range:"du {a} au {b}", empty:"Aucun événement pour l'instant." },
  es: { buf:"Lista temporal", willMake:"creará", events:"evento(s)", justAdded:"+ añadido {n}", del:"Eliminar", clearAll:"Borrar todo", repeat:"Se repite {n}×", weekly:"{wd} cada semana", range:"del {a} al {b}", empty:"Aún no hay eventos." },
  zh: { buf:"临时列表", willMake:"将创建", events:"个事件", justAdded:"+ 新增 {n}", del:"删除", clearAll:"全部清除", repeat:"重复 {n} 次", weekly:"每周{wd}", range:"从 {a} 到 {b}", empty:"暂无事件。" }
};
function tx(k){ return (UIX[curLang] || UIX.vi)[k]; }

const SVG_REPEAT = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 1 0-2 5"/><path d="M20 5v6h-6"/></svg>';
const SVG_X = '<svg viewBox="0 0 24 24" fill="none" stroke="#D85A30" stroke-width="2.5" stroke-linecap="round"><line x1="7" y1="7" x2="17" y2="17"/><line x1="17" y1="7" x2="7" y2="17"/></svg>';
const SVG_CAL_WHITE = '<svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="15" rx="2.5" stroke="#fff" stroke-width="2"/><line x1="4" y1="10" x2="20" y2="10" stroke="#fff" stroke-width="2"/><line x1="9" y1="3" x2="9" y2="7" stroke="#fff" stroke-width="2"/><line x1="15" y1="3" x2="15" y2="7" stroke="#fff" stroke-width="2"/><line x1="12" y1="12" x2="12" y2="18" stroke="#fff" stroke-width="2"/><line x1="9" y1="15" x2="15" y2="15" stroke="#fff" stroke-width="2"/></svg>';

// render(parsed) giờ CỘNG DỒN sự kiện vào buffer thay vì thay thế
function render(parsed) {
  const evs = (parsed && parsed.events) ? parsed.events : [];
  buffer.push(...evs);
  lastAddedCount = evs.length;
  renderBuffer();
}

function removeEvent(i) {
  buffer.splice(i, 1);
  lastAddedCount = 0;
  renderBuffer();
}

function clearBuffer() {
  buffer = [];
  lastAddedCount = 0;
  document.getElementById("result").innerHTML = "";
}

function delButtonHTML(i) {
  return '<button class="delbtn" onclick="removeEvent(' + i + ')">' + SVG_X + esc(tx("del")) + '</button>';
}

function renderBuffer() {
  const box = document.getElementById("result");
  lastOcc = expandEvents({ events: buffer });   // để nút thêm-vào-lịch / .ics dùng đủ mọi buổi
  if (buffer.length === 0) { box.innerHTML = ""; return; }
  const total = lastOcc.length;

  let head = tx("buf") + ' · ' + tx("willMake") + ' <b style="color:var(--text)">' + total + '</b> ' + tx("events");
  if (lastAddedCount > 0) head += ' &nbsp; <span class="just-added">' + esc(fmt(tx("justAdded"), { n: lastAddedCount })) + '</span>';
  let html = '<div class="card"><div style="margin-bottom:10px;color:var(--muted);font-size:13px">' + head + '</div>';

  buffer.forEach((ev, i) => {
    const title = ev.title || t("unnamed");
    const cat = ev.category ? ('<span class="tag">' + esc(ev.category) + '</span>') : '';
    const rm = ev.reminder_minutes_before;
    const nhac = rm ? fmt(t("remindBefore"), { n: rm }) : '';
    const loc = ev.location ? ('<br>📍 ' + esc(ev.location)) : '';

    if (ev.recurrence) {
      const rec = ev.recurrence;
      const wdIdx = WEEKDAY_MAP[String(rec.weekday).toLowerCase().slice(0,3)];
      const first = nextWeekday(parseDate(rec.start_date), wdIdx);
      const count = rec.count || 1;
      const last = addWeeks(first, count - 1);
      const badge = '<span class="rec-badge">' + SVG_REPEAT + esc(fmt(tx("repeat"), { n: count })) + '</span>';
      const meta = esc(fmt(tx("weekly"), { wd: wd(mon0(first)) })) + ' &nbsp;·&nbsp; 🕐 ' + (ev.start_time || "??:??") +
                   (nhac ? ' &nbsp;·&nbsp; ' + nhac : '') + loc +
                   '<br>' + esc(fmt(tx("range"), { a: fmtDate(first), b: fmtDate(last) }));
      html += '<div class="ev rec"><div class="ev-row"><div>' + badge +
              '<div class="title">' + esc(title) + cat + '</div>' +
              '<div class="meta">' + meta + '</div></div>' + delButtonHTML(i) + '</div></div>';
      return;
    }

    if (!ev.date) {
      html += '<div class="ev warn"><div class="ev-row"><div>' +
              '<div class="title">' + esc(title) + '</div>' +
              '<div class="meta">' + esc(t("missingDateTime")) + '</div></div>' + delButtonHTML(i) + '</div></div>';
      return;
    }

    const day = parseDate(ev.date);
    const goc = ev._local ? (' &nbsp;·&nbsp; 🌍 ' + esc(ev._local) + ' ' + esc(t("toLocal"))) : '';
    const meta = wd(mon0(day)) + ', ' + fmtDate(day) +
                 ' &nbsp;·&nbsp; 🕐 ' + (ev.start_time || "??:??") +
                 (nhac ? ' &nbsp;·&nbsp; ' + nhac : '') + goc + loc;
    html += '<div class="ev"><div class="ev-row"><div>' +
            '<div class="title">' + esc(title) + cat + '</div>' +
            '<div class="meta">' + meta + '</div></div>' + delButtonHTML(i) + '</div></div>';
  });

  const link = '<a href="#" onclick="downloadICS();return false;">' + esc(t("gcalLink")) + '</a>';
  html += '<div class="row" style="margin-top:6px">' +
          '<button onclick="addToGoogleCalendar()"><span class="btn-ico">' + SVG_CAL_WHITE + '</span>' + esc(t("addGcalBtn")) + '</button>' +
          '<button class="ghost" onclick="clearBuffer()">' + esc(tx("clearAll")) + '</button>' +
          '</div>' +
          '<div class="muted" style="margin-top:8px;font-size:13px;line-height:1.5">' +
          fmt(t("gcalHint"), { link }) +
          '</div>' +
          '</div>';
  box.innerHTML = html;
}
function esc(s){ return String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

// ====================== ĐIỀU KHIỂN GIAO DIỆN ======================
const statusEl = document.getElementById("status");
function setStatus(msg, isErr) {
  statusEl.textContent = msg || "";
  statusEl.className = "status" + (isErr ? " err" : "");
}

async function doParse() {
  const key = document.getElementById("key").value.trim();
  const text = document.getElementById("text").value.trim();
  if (!key) { setStatus(t("noKey"), true); return; }
  if (!text) { setStatus(t("noText"), true); return; }
  const tra = document.getElementById("grounding").checked;
  setStatus(tra ? t("parsingGrounded") : t("parsingNormal"));
  try {
    let parsed = tra ? await callGeminiGrounded(text, key)
                     : await callGemini(text, key);
    if (tra) parsed = applyTimezone(parsed);
    if (tra && parsed.need_confirm) setStatus(t("needConfirm"));
    else if (tra) setStatus(t("doneGrounded"));
    else setStatus(t("doneNormal"));
    render(parsed);
  } catch (e) {
    setStatus(e.message, true);
  }
}
const parseBtn = document.getElementById("parseBtn");
parseBtn.addEventListener("click", doParse);

// ----- Nhận giọng nói (Web Speech API) -----
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn = document.getElementById("micBtn");
const micLabel = document.getElementById("micLabel");
let recog = null, listening = false, finalText = "", userStopped = false;

if (!SR) {
  micBtn.disabled = true;
  setStatus(t("browserNoSpeech"), true);
} else {
  recog = new SR();
  recog.lang = LANGS[curLang].stt;
  recog.interimResults = true;
  recog.continuous = true;

  recog.onresult = (e) => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i];
      if (r.isFinal) finalText += r[0].transcript;
      else interim += r[0].transcript;
    }
    document.getElementById("text").value = (finalText + interim).trim();
  };

  recog.onerror = (e) => {
    if (e.error === "no-speech" || e.error === "aborted") return;
    setStatus(t("micErrorPrefix") + e.error, true);
  };

  recog.onend = () => {
    if (!userStopped) { try { recog.start(); } catch (e) {} }
    else stopRec();
  };

  micBtn.addEventListener("click", () => listening ? endByUser() : startRec());
}
const ICON = {
  mic: '<svg viewBox="0 0 40 40" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="13" y="4" width="14" height="16" rx="7" fill="#fff"/><path d="M8 18 a12 12 0 0 0 24 0" stroke="#fff" stroke-width="2.5"/><line x1="20" y1="28" x2="20" y2="33" stroke="#fff" stroke-width="2.5"/><line x1="15" y1="33" x2="27" y2="33" stroke="#fff" stroke-width="2.5"/></svg>',
  stop: '<svg viewBox="0 0 40 40"><rect x="12" y="12" width="16" height="16" rx="4" fill="#fff"/></svg>'
};
function startRec() {
  listening = true; userStopped = false; finalText = "";
  micBtn.classList.add("rec");
  micBtn.innerHTML = ICON.stop;
  micLabel.textContent = t("micListening");
  setStatus(t("micStartHint"));
  document.getElementById("text").value = "";
  try { recog.start(); } catch(e) {}
}
function endByUser() {
  userStopped = true;
  try { recog.stop(); } catch(e) {}
}
function stopRec() {
  listening = false;
  micBtn.classList.remove("rec");
  micBtn.innerHTML = ICON.mic;
  micLabel.textContent = t("micIdle");
  setStatus(t("micStopped"));
}

// ----- Câu ví dụ bấm nhanh (dựng lại theo ngôn ngữ) -----
const exBox = document.getElementById("examples");
function renderExamples() {
  exBox.innerHTML = "";
  LANGS[curLang].examples.forEach(s => {
    const c = document.createElement("div");
    c.className = "chip"; c.textContent = s;
    c.onclick = () => { document.getElementById("text").value = s; setStatus(t("exFilled")); };
    exBox.appendChild(c);
  });
}

// ----- Nhớ API key trên máy này (localStorage) -----
const keyInput = document.getElementById("key");
const rememberBox = document.getElementById("remember");
const savedKey = localStorage.getItem("gemini_key");
if (savedKey) { keyInput.value = savedKey; rememberBox.checked = true; }
function syncKeyStore() {
  if (rememberBox.checked && keyInput.value.trim()) {
    localStorage.setItem("gemini_key", keyInput.value.trim());
  } else {
    localStorage.removeItem("gemini_key");
  }
}
keyInput.addEventListener("input", syncKeyStore);
rememberBox.addEventListener("change", syncKeyStore);

// ====================== ÁP DỤNG NGÔN NGỮ ======================
function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }
function applyLang() {
  const L = LANGS[curLang];
  document.documentElement.lang = curLang;
  document.title = L.ui.title;
  setText("uiTitle", L.ui.title);
  setText("uiSub", L.ui.sub);
  setText("uiLangLabel", L.ui.langLabel);
  setText("uiKeyLabel", L.ui.keyLabel);
  setText("uiRemember", L.ui.rememberLabel);
  setText("uiKeyHint", L.ui.keyHint);
  setText("uiTextLabel", L.ui.textLabel);
  setText("uiGrounding", L.ui.groundingLabel);
  setText("uiHowSummary", L.ui.howSummary);
  const hb = document.getElementById("uiHowBody"); if (hb) hb.innerHTML = L.ui.howBody;
  keyInput.placeholder = L.ui.keyPlaceholder;
  document.getElementById("text").placeholder = L.ui.textPlaceholder;
  parseBtn.textContent = L.ui.parseBtn;
  micBtn.title = L.ui.micIdle;
  if (!SR) micLabel.textContent = L.ui.micNotSupported;
  else if (!listening) micLabel.textContent = L.ui.micIdle;
  else micLabel.textContent = L.ui.micListening;
  if (recog) recog.lang = L.stt;
  renderExamples();
}

// ----- Ô chọn ngôn ngữ -----
const langSel = document.getElementById("lang");
Object.keys(LANGS).forEach(code => {
  const o = document.createElement("option");
  o.value = code; o.textContent = LANGS[code].nativeName;
  langSel.appendChild(o);
});
langSel.value = curLang;
langSel.addEventListener("change", () => {
  curLang = langSel.value;
  localStorage.setItem("app_lang", curLang);
  applyLang();
});

// Chạy lần đầu.
applyLang();
</script>
